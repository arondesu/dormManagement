{% extends '_base.html' %}

{% block title %}Edit Tenant{% endblock %}

{% block content %}
<div class="container-modern">
    <div class="page-header">
        <h1 class="page-title">Edit Tenant</h1>
        <p class="page-subtitle">Update tenant profile details</p>
    </div>

    <div class="card-modern card-pad-sm">
        <form method="POST">
            <div class="row g-3">
                <div class="col-md-6">
                    <label class="form-label-modern">Student Account</label>
                    <select name="user_id" class="form-control-modern">
                        <option value="">Unlinked (optional)</option>
                        {% for student in students %}
                            <option value="{{ student.user_id }}" {% if tenant.user_id == student.user_id %}selected{% endif %}>{{ student.first_name }} {{ student.last_name }} ({{ student.username }})</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="col-md-6">
                    <label class="form-label-modern">Tenant Code</label>
                    <input type="text" name="tenant_code" value="{{ tenant.tenant_code or '' }}" class="form-control-modern">
                </div>
                <div class="col-md-6">
                    <label class="form-label-modern">Emergency Contact Name</label>
                    <input type="text" name="emergency_contact_name" value="{{ tenant.emergency_contact_name or '' }}" class="form-control-modern">
                </div>
                <div class="col-md-6">
                    <label class="form-label-modern">Emergency Contact Phone</label>
                    <input type="text" name="emergency_contact_phone" value="{{ tenant.emergency_contact_phone or '' }}" class="form-control-modern">
                </div>
                <div class="col-md-6">
                    <label class="form-label-modern">Guardian Name</label>
                    <input type="text" name="guardian_name" value="{{ tenant.guardian_name or '' }}" class="form-control-modern">
                </div>
                <div class="col-md-3">
                    <label class="form-label-modern">Status</label>
                    <select name="status" class="form-control-modern">
                        <option value="active" {% if tenant.status == 'active' %}selected{% endif %}>Active</option>
                        <option value="inactive" {% if tenant.status == 'inactive' %}selected{% endif %}>Inactive</option>
                        <option value="blacklisted" {% if tenant.status == 'blacklisted' %}selected{% endif %}>Blacklisted</option>
                    </select>
                </div>
                <div class="col-md-3">
                    <label class="form-label-modern">Check-in Date</label>
                    <input type="date" name="check_in_date" value="{{ tenant.check_in_date or '' }}" class="form-control-modern">
                </div>
                <div class="col-md-3">
                    <label class="form-label-modern">Check-out Date</label>
                    <input type="date" name="check_out_date" value="{{ tenant.check_out_date or '' }}" class="form-control-modern">
                </div>
                <div class="col-md-12">
                    <label class="form-label-modern">Notes</label>
                    <textarea name="notes" class="form-control-modern" rows="3">{{ tenant.notes or '' }}</textarea>
                </div>
            </div>

            <div class="d-flex gap-2 mt-4">
                <button type="submit" class="btn-primary-modern">Save Changes</button>
                <a href="{{ url_for('tenants') }}" class="btn-secondary-modern">Cancel</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
