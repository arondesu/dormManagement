{% extends '_base.html' %}

{% block title %}Add Tenant{% endblock %}

{% block content %}
<div class="container-modern">
    <div class="page-header">
        <h1 class="page-title">Add Tenant</h1>
        <p class="page-subtitle">Create a tenant profile linked to a student account</p>
    </div>

    <div class="card-modern card-pad-sm">
        <form method="POST">
            <div class="row g-3">
                <div class="col-md-6">
                    <label class="form-label-modern">Student Account</label>
                    <select name="user_id" class="form-control-modern">
                        <option value="">Unlinked (optional)</option>
                        {% for student in students %}
                            <option value="{{ student.user_id }}">{{ student.first_name }} {{ student.last_name }} ({{ student.username }})</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="col-md-6">
                    <label class="form-label-modern">Tenant Code</label>
                    <input type="text" name="tenant_code" class="form-control-modern" placeholder="TN-0001">
                </div>
                <div class="col-md-6">
                    <label class="form-label-modern">Emergency Contact Name</label>
                    <input type="text" name="emergency_contact_name" class="form-control-modern">
                </div>
                <div class="col-md-6">
                    <label class="form-label-modern">Emergency Contact Phone</label>
                    <input type="text" name="emergency_contact_phone" class="form-control-modern">
                </div>
                <div class="col-md-6">
                    <label class="form-label-modern">Guardian Name</label>
                    <input type="text" name="guardian_name" class="form-control-modern">
                </div>
                <div class="col-md-3">
                    <label class="form-label-modern">Status</label>
                    <select name="status" class="form-control-modern">
                        <option value="active">Active</option>
                        <option value="inactive">Inactive</option>
                        <option value="blacklisted">Blacklisted</option>
                    </select>
                </div>
                <div class="col-md-3">
                    <label class="form-label-modern">Check-in Date</label>
                    <input type="date" name="check_in_date" class="form-control-modern">
                </div>
                <div class="col-md-3">
                    <label class="form-label-modern">Check-out Date</label>
                    <input type="date" name="check_out_date" class="form-control-modern">
                </div>
                <div class="col-md-12">
                    <label class="form-label-modern">Notes</label>
                    <textarea name="notes" class="form-control-modern" rows="3"></textarea>
                </div>
            </div>

            <div class="d-flex gap-2 mt-4">
                <button type="submit" class="btn-primary-modern">Save Tenant</button>
                <a href="{{ url_for('tenants') }}" class="btn-secondary-modern">Cancel</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
