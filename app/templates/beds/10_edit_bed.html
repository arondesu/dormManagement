{% extends '_base.html' %}

{% block title %}Edit Bed{% endblock %}

{% block content %}
<div class="container-modern">
    <div class="page-header">
        <h1 class="page-title">Edit Bed</h1>
        <p class="page-subtitle">Update bed room assignment and occupancy</p>
    </div>

    <div class="card-modern card-pad-sm">
        <form method="POST">
            <div class="row g-3">
                <div class="col-md-6">
                    <label class="form-label-modern">Room</label>
                    <select name="room_id" class="form-control-modern" required>
                        {% for room in rooms %}
                            <option value="{{ room.room_id }}" {% if bed.room_id == room.room_id %}selected{% endif %}>{{ room.building_name }} - Room {{ room.room_number }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="col-md-6">
                    <label class="form-label-modern">Bed Label</label>
                    <input type="text" name="bed_label" value="{{ bed.bed_label }}" class="form-control-modern" required>
                </div>
                <div class="col-md-6">
                    <label class="form-label-modern">Occupant</label>
                    <select name="occupied_by_tenant_id" class="form-control-modern">
                        <option value="">Unassigned</option>
                        {% for tenant in tenants %}
                            <option value="{{ tenant.tenant_id }}" {% if bed.occupied_by_tenant_id == tenant.tenant_id %}selected{% endif %}>{{ tenant.first_name }} {{ tenant.last_name }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="col-md-12">
                    <label class="form-label-modern">Notes</label>
                    <textarea name="notes" class="form-control-modern" rows="3">{{ bed.notes or '' }}</textarea>
                </div>
            </div>

            <div class="d-flex gap-2 mt-4">
                <button type="submit" class="btn-primary-modern">Save Changes</button>
                <a href="{{ url_for('beds') }}" class="btn-secondary-modern">Cancel</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
