{% extends '_base.html' %}

{% block title %}Add Bed{% endblock %}

{% block content %}
<div class="container-modern">
    <div class="page-header">
        <h1 class="page-title">Add Bed</h1>
        <p class="page-subtitle">Create a bed slot for a selected room</p>
    </div>

    <div class="card-modern card-pad-sm">
        <form method="POST">
            <div class="row g-3">
                <div class="col-md-6">
                    <label class="form-label-modern">Room</label>
                    <select name="room_id" class="form-control-modern" required>
                        <option value="">Select room</option>
                        {% for room in rooms %}
                            <option value="{{ room.room_id }}">{{ room.building_name }} - Room {{ room.room_number }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="col-md-6">
                    <label class="form-label-modern">Bed Label</label>
                    <input type="text" name="bed_label" class="form-control-modern" placeholder="Bed A" required>
                </div>
                <div class="col-md-6">
                    <label class="form-label-modern">Occupant (optional)</label>
                    <select name="occupied_by_tenant_id" class="form-control-modern">
                        <option value="">Unassigned</option>
                        {% for tenant in tenants %}
                            <option value="{{ tenant.tenant_id }}">{{ tenant.first_name }} {{ tenant.last_name }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="col-md-12">
                    <label class="form-label-modern">Notes</label>
                    <textarea name="notes" class="form-control-modern" rows="3"></textarea>
                </div>
            </div>

            <div class="d-flex gap-2 mt-4">
                <button type="submit" class="btn-primary-modern">Save Bed</button>
                <a href="{{ url_for('beds') }}" class="btn-secondary-modern">Cancel</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
