{% extends '_base.html' %}

{% block title %}Add Maintenance Ticket{% endblock %}

{% block content %}
<div class="container-modern">
    <div class="page-header">
        <h1 class="page-title">Add Maintenance Ticket</h1>
        <p class="page-subtitle">Create a new maintenance issue for tracking</p>
    </div>

    <div class="card-modern card-pad-sm">
        <form method="POST">
            <div class="row g-3">
                <div class="col-md-8">
                    <label class="form-label-modern">Title</label>
                    <input type="text" name="title" class="form-control-modern" required>
                </div>
                <div class="col-md-4">
                    <label class="form-label-modern">Priority</label>
                    <select name="priority" class="form-control-modern">
                        <option value="low">Low</option>
                        <option value="medium" selected>Medium</option>
                        <option value="high">High</option>
                        <option value="urgent">Urgent</option>
                    </select>
                </div>
                <div class="col-md-4">
                    <label class="form-label-modern">Status</label>
                    <select name="status" class="form-control-modern">
                        <option value="open" selected>Open</option>
                        <option value="in_progress">In Progress</option>
                        <option value="resolved">Resolved</option>
                        <option value="closed">Closed</option>
                    </select>
                </div>
                <div class="col-md-4">
                    <label class="form-label-modern">Room</label>
                    <select name="room_id" class="form-control-modern">
                        <option value="">Select room</option>
                        {% for room in rooms %}
                            <option value="{{ room.room_id }}">{{ room.building_name }} - Room {{ room.room_number }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="col-md-4">
                    <label class="form-label-modern">Tenant</label>
                    <select name="tenant_id" class="form-control-modern">
                        <option value="">Select tenant</option>
                        {% for tenant in tenants %}
                            <option value="{{ tenant.tenant_id }}">{{ tenant.first_name }} {{ tenant.last_name }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="col-md-6">
                    <label class="form-label-modern">Assign To</label>
                    <select name="assigned_to" class="form-control-modern">
                        <option value="">Unassigned</option>
                        {% for member in staff %}
                            <option value="{{ member.user_id }}">{{ member.first_name }} {{ member.last_name }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="col-md-12">
                    <label class="form-label-modern">Description</label>
                    <textarea name="description" class="form-control-modern" rows="3"></textarea>
                </div>
                <div class="col-md-12">
                    <label class="form-label-modern">Notes</label>
                    <textarea name="notes" class="form-control-modern" rows="2"></textarea>
                </div>
            </div>

            <div class="d-flex gap-2 mt-4">
                <button type="submit" class="btn-primary-modern">Save Ticket</button>
                <a href="{{ url_for('maintenance') }}" class="btn-secondary-modern">Cancel</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
